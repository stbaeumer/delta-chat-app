name: Build and Release

on:
  push:
    branches:
      - main
    paths:
      - "delta-chat-app/**"
      - ".github/workflows/release.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-main
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Nächste Version bestimmen
        id: version
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const semverTag = /^v?(\d+)\.(\d+)\.(\d+)$/;

            const releases = await github.paginate(github.rest.repos.listReleases, {
              owner,
              repo,
              per_page: 100,
            });

            let latest = null;

            for (const release of releases) {
              const match = semverTag.exec(release.tag_name || "");
              if (!match) {
                continue;
              }

              const current = [
                Number.parseInt(match[1], 10),
                Number.parseInt(match[2], 10),
                Number.parseInt(match[3], 10),
              ];

              if (
                !latest ||
                current[0] > latest[0] ||
                (current[0] === latest[0] && current[1] > latest[1]) ||
                (current[0] === latest[0] && current[1] === latest[1] && current[2] > latest[2])
              ) {
                latest = current;
              }
            }

            const next = latest ? [latest[0], latest[1] + 1, 0] : [1, 0, 0];
            const nextTag = `${next[0]}.${next[1]}.${next[2]}`;

            core.setOutput("tag", nextTag);
            core.info(`Nächste Version: ${nextTag}`);

      - name: Paket als .xdc bauen
        run: |
          VERSION="${{ steps.version.outputs.tag }}"
          (cd delta-chat-app && zip -9 --recurse-paths - *) > "delta-chat-app-${VERSION}.xdc"

      - name: Release veröffentlichen
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Release ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          files: delta-chat-app-${{ steps.version.outputs.tag }}.xdc